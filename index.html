<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Battle</title>
  <link rel="preload" as="image" href="open.png">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg-color: #EFE4D3; --card-bg: #FCFAF5; --text-color: #61564C;
      --highlight-color: #EFB344; --secondary-highlight: #EE8F7B;
    }
    body, html {
      margin: 0; padding: 0; height: 100%; background-color: var(--bg-color);
      color: var(--text-color); font-family: 'OK Mallang B', 'OkMallangB', 'Jua', sans-serif;
      display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
    }
    header { text-align: center; margin-top: 40px; position: relative; width: 100%; max-width: 450px; }
    .global-counter { font-size: 1.5rem; background-color: var(--card-bg); padding: 10px 24px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
    #reset-nickname-btn { position: absolute; right: 10px; top: 10px; padding: 8px 15px; border-radius: 20px; border: none; background: #EE8F7B; color: white; cursor: pointer; font-family: inherit; }
    .game-container { display: flex; flex-direction: column; align-items: center; margin-top: 30px; flex: 1; }
    .my-score-display { font-size: 4rem; color: var(--secondary-highlight); text-shadow: 2px 2px 0px #fff; }
    .avatar { width: 100%; max-width: 320px; cursor: pointer; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1)); transition: transform 0.08s; }
    .avatar.clicked { transform: scale(1.05) translateY(-5px); }
    .leaderboard-box { width: 90%; max-width: 450px; background: var(--card-bg); border-radius: 28px; padding: 24px; margin-bottom: 40px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
    .rank-list { list-style: none; padding: 0; max-height: 260px; overflow-y: auto; }
    .rank-item { display: flex; justify-content: space-between; padding: 12px 16px; margin-bottom: 10px; background: #F8EFE4; border-radius: 18px; font-size: 1.2rem; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(250,248,245,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .nickname-box { background: var(--card-bg); padding: 40px; border-radius: 28px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .nickname-input { font-size: 1.5rem; padding: 10px; border: 3px solid #EFE4D3; border-radius: 15px; margin-bottom: 20px; text-align: center; width: 200px; }
    .nickname-btn { font-size: 1.5rem; padding: 10px 30px; background: var(--highlight-color); color: white; border: none; border-radius: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <div class="global-counter">전체 팝 수 <span id="global-clicks">0</span></div>
    <button id="reset-nickname-btn">닉네임 변경</button>
  </header>
  <div class="overlay" id="loading-overlay">
    <div class="nickname-box">
      <div style="margin-bottom:20px;">나만의 팝캣 닉네임 🎉</div>
      <input type="text" id="nickname-input" class="nickname-input" maxlength="8" placeholder="최대 8글자"><br>
      <button id="nickname-btn" class="nickname-btn">시작하기</button>
    </div>
  </div>
  <div class="game-container">
    <div class="my-score-display" id="my-score">0</div>
    <img class="avatar" id="avatar" src="normal.png" draggable="false">
  </div>
  <div class="leaderboard-box">
    <div class="leaderboard-title">🏆 명예의 전당</div>
    <ul class="rank-list" id="rank-list"></ul>
  </div>
  <script>
    const socket = io();
    let myId = localStorage.getItem('popcat_v3');
    let personalScore = 0, pendingClicks = 0, audioCtx;
    const loadingOverlay = document.getElementById('loading-overlay');
    const myScoreEl = document.getElementById('my-score');
    const avatarEl = document.getElementById('avatar');

    function playPopSound() {
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function initApp() {
      if(myId) { loadingOverlay.style.display='none'; personalScore = parseInt(localStorage.getItem('score')||0); myScoreEl.innerText=personalScore; }
      else {
        document.getElementById('nickname-btn').onclick = () => {
          const v = document.getElementById('nickname-input').value.trim();
          if(v) { myId = v.substring(0,8); localStorage.setItem('popcat_v3', myId); loadingOverlay.style.display='none'; }
        }
      }
    }

    avatarEl.onmousedown = avatarEl.ontouchstart = (e) => {
      if(e.type==='touchstart') e.preventDefault();
      avatarEl.src = 'open.png'; avatarEl.classList.add('clicked');
      playPopSound(); personalScore++; pendingClicks++;
      myScoreEl.innerText = personalScore; localStorage.setItem('score', personalScore);
    };
    window.onmouseup = window.ontouchend = () => { avatarEl.src = 'normal.png'; avatarEl.classList.remove('clicked'); };

    document.getElementById('reset-nickname-btn').onclick = () => { localStorage.removeItem('popcat_v3'); location.reload(); };

    setInterval(() => { if(pendingClicks > 0 && myId) { socket.emit('add_clicks', {id:myId, count:pendingClicks}); pendingClicks=0; } }, 300);
    socket.on('leaderboard_update', d => {
      document.getElementById('global-clicks').innerText = d.totalClicks.toLocaleString();
      const list = document.getElementById('rank-list'); list.innerHTML = '';
      d.ranking.forEach((en, i) => {
        const li = document.createElement('li'); li.className = 'rank-item';
        li.innerHTML = `<span>${i+1}위 <b>${en.id}</b></span><span>${en.score.toLocaleString()} 팝</span>`;
        if(en.id === myId) li.style.borderLeft = '5px solid #EFB344';
        list.appendChild(li);
      });
    });
    initApp();
  </script>
</body>
</html>
