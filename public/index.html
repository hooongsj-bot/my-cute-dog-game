<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 팝캣 배틀!</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
     --bg-color: #EFEFEF;
     --text-color: #333;
     --highlight-color: #4CAF50;
  }
  body, html {
    margin: 0; padding: 0; height: 100%;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Gaegu', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  
  header {
    text-align: center;
    margin-top: 20px;
  }
  header h1 { margin: 0; font-size: 3rem; }
  .global-counter { font-size: 2rem; color: #555; }
  
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    flex: 1;
  }
  
  .my-score-display {
    font-size: 3.5rem;
    font-weight: bold;
    color: var(--highlight-color);
    margin-bottom: 20px;
  }

  /* Cat / Image Avatar */
  .avatar {
    width: 100%;
    max-width: 350px;
    height: auto;
    object-fit: contain;
    user-select: none;
    cursor: pointer;
    margin-bottom: 40px;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
    -webkit-tap-highlight-color: transparent;
  }
  .avatar.clicked {
    transform: scale(1.05) translateY(-10px);
  }

  /* Leaderboard */
  .leaderboard-box {
    width: 90%; max-width: 500px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    padding: 20px;
    margin-bottom: 40px;
  }
  .leaderboard-title {
    text-align: center; font-size: 2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px;
  }
  .rank-list {
    list-style: none; padding: 0; margin: 0;
    max-height: 300px; overflow-y: auto;
  }
  .rank-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px; border-bottom: 1px solid #f0f0f0;
    font-size: 1.5rem;
  }
  .rank-item:nth-child(1) { font-size: 2.2rem; font-weight: bold; background: #fffbe6; border-radius: 10px;}
  .rank-item:nth-child(2) { font-size: 1.8rem; background: #f4f6ff; border-radius: 10px;}
  .rank-item:nth-child(3) { font-size: 1.6rem; background: #fff0f0; border-radius: 10px;}
  
  .rank-country { display: flex; align-items: center; gap: 10px;}
  .rank-score { font-weight: bold; color: #666; }

  /* Country Detection overlay */
  .overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(255,255,255,0.8);
    display: flex; justify-content: center; align-items: center;
    font-size: 2rem; z-index: 1000;
  }
</style>
</head>
<body>

<div class="overlay" id="loading-overlay">국가 인식 중... 🌍</div>

<header>
  <h1>글로벌 팝캣 배틀!</h1>
  <div class="global-counter">전 세계 누적: <span id="global-clicks">0</span></div>
</header>

<div class="game-container">
  <div class="my-score-display" id="my-score">0</div>
  <Dog image logic: Normal = normal.png, Clicked = open.png>
  <img class="avatar" id="avatar" src="normal.png" alt="Dog Avatar" draggable="false">
</div>

<div class="leaderboard-box">
  <div class="leaderboard-title">🏆 국가별 실시간 랭킹 추이</div>
  <ul class="rank-list" id="rank-list">
    <!-- List items injected by JS -->
  </ul>
</div>

<script>
  const socket = io();
  
  // Game state
  let myCountryCode = 'US'; // default fallback
  let personalScore = 0;
  let pendingClicks = 0;

  // DOM Elements
  const loadingOverlay = document.getElementById('loading-overlay');
  const globalClicksEl = document.getElementById('global-clicks');
  const myScoreEl = document.getElementById('my-score');
  const avatarEl = document.getElementById('avatar');
  const rankListEl = document.getElementById('rank-list');

  // Web Audio Context for sound effect
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playPopSound() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.type = 'sine';
    // Pop snap sound
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.05);
    
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
  }

  // Utilities
  // Converts standard ISO 2-letter Code (e.g. KR) to Flag Emoji (🇰🇷)
  function getFlagEmoji(countryCode) {
    if(!countryCode || countryCode.length !== 2) return '🏁';
    const codePoints = countryCode
      .toUpperCase()
      .split('')
      .map(char =>  127397 + char.charCodeAt());
    return String.fromCodePoint(...codePoints);
  }

  // Detect Country
  async function detectCountry() {
    try {
      const response = await fetch('https://ipapi.co/json/');
      const data = await response.json();
      if(data && data.country_code) {
        myCountryCode = data.country_code;
      }
    } catch (e) {
      console.warn("IP detection failed, using default (US)");
    }
    
    loadingOverlay.style.display = 'none';
    
    // Load local personal score
    const saved = localStorage.getItem('personal_score');
    if (saved) { personalScore = parseInt(saved, 10); }
    myScoreEl.innerText = personalScore;
  }

  // Handle Clicking
  function handleClick(e) {
    // 1. Play sound & animate
    playPopSound();
    avatarEl.src = 'open.png';
    avatarEl.classList.add('clicked');
    
    setTimeout(() => {
      avatarEl.src = 'normal.png';
      avatarEl.classList.remove('clicked');
    }, 100);

    // 2. Update scores
    personalScore++;
    pendingClicks++;
    
    myScoreEl.innerText = personalScore;
    localStorage.setItem('personal_score', personalScore);
    
    // 3. Floating particle
    createFloatingParticle(e);
  }

  function createFloatingParticle(e) {
    let x, y;
    if(e.type === 'touchstart') {
        x = e.touches[0].clientX;
        y = e.touches[0].clientY;
    } else {
        x = e.clientX;
        y = e.clientY;
    }
    
    const el = document.createElement('div');
    el.innerText = '+1';
    el.style.position = 'absolute';
    el.style.left = (x - 20) + 'px';
    el.style.top = (y - 20) + 'px';
    el.style.fontSize = '2rem';
    el.style.fontWeight = 'bold';
    el.style.color = '#ff4757';
    el.style.pointerEvents = 'none';
    el.style.transition = 'all 0.5s ease-out';
    document.body.appendChild(el);
    
    // Trigger tick
    setTimeout(() => {
      el.style.transform = 'translateY(-100px) scale(1.5)';
      el.style.opacity = '0';
    }, 10);
    
    setTimeout(() => { document.body.removeChild(el); }, 500);
  }

  // Events
  avatarEl.addEventListener('mousedown', handleClick);
  avatarEl.addEventListener('touchstart', (e) => {
    e.preventDefault(); // prevent mouse emulation and double clicks
    handleClick(e);
  });

  // Socket communication
  
  // Every 300ms, if there are pending clicks, batch send them to the server
  setInterval(() => {
    if (pendingClicks > 0) {
      socket.emit('add_clicks', {
        country: myCountryCode,
        count: pendingClicks
      });
      pendingClicks = 0;
    }
  }, 300);

  // Receive leaderboard updates
  socket.on('leaderboard_update', (data) => {
    globalClicksEl.innerText = data.totalClicks.toLocaleString();
    
    // Render ranking
    rankListEl.innerHTML = '';
    data.ranking.forEach((entry, index) => {
       const li = document.createElement('li');
       li.className = 'rank-item';
       
       let rankSticker = (index + 1) + '위';
       if(index === 0) rankSticker = '🥇';
       if(index === 1) rankSticker = '🥈';
       if(index === 2) rankSticker = '🥉';

       li.innerHTML = `
          <div class="rank-country">
            <span style="width: 40px; text-align: center;">${rankSticker}</span>
            <span>${getFlagEmoji(entry.code)}</span>
            <span>${entry.code}</span>
          </div>
          <div class="rank-score">${entry.score.toLocaleString()} 팝</div>
       `;
       
       // highlight my country if it matches
       if(entry.code === myCountryCode) {
         li.style.borderLeft = '5px solid #4CAF50';
       }
       
       rankListEl.appendChild(li);
    });
  });

  // Init
  detectCountry();
</script>
</body>
</html>
